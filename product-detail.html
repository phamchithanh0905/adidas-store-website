<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm chi tiết - Adidas VN</title>
    <link rel="stylesheet" href="./assets/style/style.css">
    <link rel="stylesheet" href="./assets/themify-icons/themify-icons.css">
    <style>
        .product-detail-container {
            width: 85%;
            margin: 220px auto 100px;
            display: flex;
            gap: 50px;
        }

        .product-images {
            flex: 1.2;
        }

        .product-images img {
            width: 100%;
            border: 1px solid #eee;
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.02);
        }

        .product-info {
            flex: 1;
            font-family: 'Times New Roman', serif;
        }

        .product-info h1 {
            font-size: 40px;
            margin: 0 0 10px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .product-info .category {
            color: #767677;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 20px;
            display: block;
            letter-spacing: 1px;
        }

        .product-info .price {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #000;
        }

        .product-info .description {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 40px;
            padding-right: 20px;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
        }

        .btn-black {
            padding: 20px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .btn-black:hover {
            background: #333;
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
        }

        .btn-white {
            padding: 20px;
            background: #fff;
            color: #000;
            border: 1px solid #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .btn-white:hover {
            background: #f5f5f5;
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.05);
        }

        .breadcrumb {
            margin-bottom: 30px;
            font-size: 14px;
            color: #767677;
        }

        .breadcrumb a {
            color: #767677;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #000;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- Main Header -->
    <div id="main-header">
        <div class="head-notify">
            <p>GIAO HÀNG MIỄN PHÍ CHO THÀNH VIÊN CỦA ADICLUB</p>
        </div>

        <div id="header-nav">
            <div class="first-row-head">
                <ul class="first-header-nav">
                    <li><a href="#">Trợ giúp</a></li>
                    <li><a href="#">Theo dõi đơn hàng</a></li>
                    <li><img src="./assets/hinhanh/vn.svg" alt="VN" style="width: 20px;"></li>
                </ul>
            </div>
            <div class="second-row-head">
                <div class="header-logo">
                    <a href="index.html">
                        <img src="./assets/hinhanh/logoadidas.jpg" alt="logo" style="width: 70px;">
                    </a>
                </div>
                <div id="list">
                    <ul class="second-header-nav">
                        <li><a href="index.html">HOME</a></li>
                        <li><a href="clothes.html">CLOTHES</a></li>
                        <li><a href="index.html#option-product">MEN</a></li>
                        <li><a href="index.html#news">HOT</a></li>
                    </ul>
                </div>
                <div class="header-actions">
                    <div class="search-container">
                        <input id="inputsearch" type="text" placeholder="Search..." class="search-input">
                        <i class="ti-search"></i>
                    </div>
                    <div class="user-info flex items-center gap-10">
                        <span id="userNameDisplay" style="font-size: 11px; font-weight: bold;">GUEST</span>
                        <a href="login.html" class="icon-link"><i class="ti-user"></i></a>
                    </div>
                    <div class="love relative">
                        <a href="wishlist.html" class="icon-link">
                            <i class="ti-heart"></i>
                            <span id="wishlistCount" class="badge">0</span>
                        </a>
                    </div>
                    <div class="cart relative">
                        <a href="cart.html" class="icon-link">
                            <i class="ti-bag"></i>
                            <span id="cartCount" class="badge">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="product-detail-container">
        <div class="product-images">
            <img id="detailImg" src="" alt="Product Image">
        </div>
        <div class="product-info">
            <div class="breadcrumb">
                <a href="index.html">Trang chủ</a> / <a href="clothes.html">Quần áo</a> / <span id="breadName">Sản
                    phẩm</span>
            </div>
            <span class="category" id="detailCat">Performance</span>
            <h1 id="detailTitle">Tên sản phẩm</h1>
            <p class="price" id="detailPrice">0₫</p>
            <div class="description">
                <p id="detailDesc">Thông tin chi tiết đang được cập nhật...</p>
            </div>

            <div class="action-btns">
                <button class="btn-black" onclick="handleAddToCart()">
                    Thêm vào giỏ hàng <i class="ti-bag"></i>
                </button>
                <button class="btn-white" onclick="handleAddToWishlist()">
                    Yêu thích <i class="ti-heart"></i>
                </button>
            </div>
        </div>
    </div>

    <footer style="background: #000; color: #fff; text-align: center; padding: 60px 0; margin-top: 100px;">
        <div class="container">
            <img src="./assets/hinhanh/logoadidas.jpg" alt="footer-logo"
                style="width: 60px; filter: invert(1); margin-bottom: 20px;">
            <p>&copy; 2026 Adidas VN - Official Store Clone</p>
        </div>
    </footer>

    <script src="./assets/style/main.js"></script>
    <script>
        let currentProduct = null;

        function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            currentProduct = window.products[id];

            if (currentProduct) {
                document.getElementById('detailTitle').innerText = currentProduct.name;
                document.getElementById('breadName').innerText = currentProduct.name;
                document.getElementById('detailPrice').innerText = currentProduct.price;
                document.getElementById('detailImg').src = currentProduct.img;
                document.getElementById('detailDesc').innerText = currentProduct.desc;
                document.getElementById('detailCat').innerText = currentProduct.cat;
                document.title = currentProduct.name + " - Adidas VN";
            } else {
                window.location.href = 'clothes.html';
            }
            if (typeof window.updateBadges === 'function') window.updateBadges();
        }

        function handleAddToCart() {
            if (window.addToCart) window.addToCart(currentProduct);
        }

        function handleAddToWishlist() {
            if (window.addToWishlist) window.addToWishlist(currentProduct);
        }

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>

</html>
