<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; font-family: Arial; }
    body { background: #2b2b2b; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-container { background: #555; padding: 30px 20px; border-radius: 10px; text-align: center; width: 300px; color: white; }
    .input-box { width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 5px; font-weight: bold; }
    .login-btn { width: 100%; padding: 12px; background: #91b8cd; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .login-btn:hover { background: #7ca7bd; }
    .register-text { font-size: 12px; margin-top: 10px; }
    .register-text a { color: white; font-weight: bold; text-decoration: none; }
    .error { color: #ffb3b3; font-size: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Adidas_Logo.svg" width="60" />
    <div id="errorMsg" class="error"></div>
    <input type="text" id="email" class="input-box" placeholder="EMAIL ADDRESS" />
    <input type="password" id="password" class="input-box" placeholder="PASSWORD" />
    <div class="register-text">Don't have an account? <a href="register.html">REGISTER</a></div>
    <button class="login-btn" onclick="login()">LOGIN</button>
  </div>
<script>
  function login() { // 🔁 Đổi từ "register" → "login"
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorDiv = document.getElementById("errorMsg");

    const formData = new FormData();
    formData.append("email", email);
    formData.append("password", password);

    fetch("login.php", { // 🔁 Đổi từ "register.php" → "login.php"
      method: "POST",
      body: formData
    })
    .then(res => res.text())
    .then(data => {
      console.log("Server trả về:", data); // Gợi ý thêm log debug
      if (data === "success") {
        errorDiv.style.color = "lightgreen";
        errorDiv.textContent = "Đăng nhập thành công!";
        setTimeout(() => {
          window.location.href = "upload_image/index.php";
        }, 1500);
      } else {
        errorDiv.style.color = "#ffb3b3";
        errorDiv.textContent = data;
      }
    });
  }
</script>


</body>
</html>
